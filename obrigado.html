<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedido recebido – CLASSIC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --black:#111111; --white:#ffffff; --gray-50:#f6f6f6; --gray-200:#e4e4e4; --gray-600:#5c5c5c; --accent:#c81e1e; --green-ok:#1e7d3a; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Montserrat',Arial,sans-serif;color:var(--black);background:var(--gray-50);}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:640px;margin:0 auto;padding:70px 24px;}
  .card{background:var(--white);border:1px solid var(--gray-200);border-radius:8px;padding:40px 34px;text-align:center;}
  .check{
    width:64px;height:64px;border-radius:50%;background:#f0f8f2;color:var(--green-ok);
    display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
  }
  .check svg{width:30px;height:30px;}
  h1{font-size:20px;font-weight:800;text-transform:uppercase;letter-spacing:.02em;margin-bottom:10px;}
  .order-id{font-size:13px;color:var(--gray-600);font-weight:600;margin-bottom:22px;}
  .status-box{
    text-align:left;border:1px dashed #f0d9b5;background:#fff8f0;border-radius:6px;padding:16px 18px;
    font-size:12.5px;color:var(--gray-600);font-weight:500;line-height:1.6;margin-bottom:26px;
  }
  .status-box b{color:var(--black);}
  .summary{text-align:left;border-top:1px solid var(--gray-200);padding-top:20px;margin-top:6px;}
  .summary h3{font-size:12px;text-transform:uppercase;letter-spacing:.05em;font-weight:800;margin-bottom:14px;}
  .row{display:flex;justify-content:space-between;font-size:13px;font-weight:500;color:var(--gray-600);padding:6px 0;}
  .row.total{font-weight:800;color:var(--black);font-size:15px;border-top:1px solid var(--gray-200);margin-top:8px;padding-top:12px;}
  .btn{display:inline-block;margin-top:28px;padding:14px 30px;background:var(--black);color:var(--white);font-size:12.5px;letter-spacing:.05em;text-transform:uppercase;font-weight:700;border-radius:3px;}
  .empty{font-size:13.5px;color:var(--gray-600);}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="content">
      <!-- preenchido via JS -->
    </div>
  </div>

<script>
  const content = document.getElementById('content');
  const raw = localStorage.getItem('classic_last_order');

  if(!raw){
    content.innerHTML = `
      <p class="empty">Nenhum pedido recente encontrado.</p>
      <a href="index.html" class="btn">Voltar à loja</a>
    `;
  }else{
    const order = JSON.parse(raw);
    const f = n => 'R$ ' + Number(n).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');

    content.innerHTML = `
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12.5l2.5 2.5L16 9.5"/></svg>
      </div>
      <h1>Pedido recebido</h1>
      <div class="order-id">Pedido #${order.id} · ${order.customer.name}</div>

      <div class="status-box">
        Recebemos os dados do seu pedido. <b>O pagamento ainda não foi processado</b> — assim que o
        gateway (Pix, cartão ou boleto) for integrado, a confirmação de pagamento passará a acontecer
        automaticamente nesta etapa.
      </div>

      <div class="summary">
        <h3>Resumo</h3>
        <div class="row"><span>Subtotal</span><span>${f(order.subtotal)}</span></div>
        ${order.discountRate > 0 ? `<div class="row"><span>Desconto (${order.promoCode})</span><span>- ${f(order.subtotal*order.discountRate)}</span></div>` : ''}
        <div class="row"><span>Frete</span><span>${order.shippingCost === 0 ? 'Grátis' : f(order.shippingCost)}</span></div>
        <div class="row total"><span>Total</span><span>${f(order.total)}</span></div>
      </div>

      <a href="index.html" class="btn">Voltar à loja</a>
    `;
  }
</script>
</body>
</html>
